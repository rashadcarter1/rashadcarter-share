<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carter Unlimited — Test Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 60px 40px;
      border: 1px solid #222;
      border-radius: 16px;
      max-width: 480px;
      background: #111;
    }
    .badge {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #888;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 28px;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #fff;
    }
    p {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #0f1f0f;
      border: 1px solid #1a3a1a;
      color: #4caf50;
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 8px;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #4caf50;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Carter Unlimited LLC</div>
    <h1>Deploy Test</h1>
    <p>If you're seeing this, the publish workflow is working. Files generated in chat are live on the web.</p>
    <div class="status">
      <div class="dot"></div>
      Pipeline active
    </div>
  </div>
</body>
</html>
